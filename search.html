<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINKSIRA — Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #2c3824; color: #e8dfca; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 40px; text-align: center; }
        .header { text-align: center; padding: 80px 0 40px; }
        .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: #f2e6cc; letter-spacing: 3px; }
        .back-link { display: inline-block; margin: 20px 0; color: #dbba7c; text-decoration: none; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; }
        .back-link:hover { color: #efcd9a; letter-spacing: 3px; }
        .search-box { margin: 50px 0; }
        .search-box input { width: 100%; padding: 15px 20px; background: #2a3a24; border: 1px solid #7a6a4a; color: #e8dfca; font-size: 1rem; font-family: 'Inter', sans-serif; }
        .search-box input:focus { outline: none; border-color: #c9a96e; }
        .search-box button { margin-top: 20px; padding: 12px 40px; background: #3a4a30; border: 1px solid #7a6a4a; color: #dbba7c; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .search-box button:hover { background: #4a5a40; border-color: #c9a96e; color: #efcd9a; }
        footer { text-align: center; padding: 60px; border-top: 1px solid #7a6a4a; margin-top: 60px; font-size: 0.7rem; color: #94845c; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>SEARCH</h1>
        <a href="index.html" class="back-link">← BACK TO HOME</a>
    </div>
    <div class="search-box">
        <input type="text" placeholder="Search for clothing, shoes, dresses, tops...">
        <button onclick="alert('Search functionality coming soon. Please check back!')">SEARCH →</button>
    </div>
</div>
<footer>© 2025 DINKSIRA — Handmade by Ethiopians</footer>
</body>
</html>
